<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Haramain</title>

  <meta name="description" content="Haramain — Your Complete Pilgrim Companion">

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="container">

<!-- LANDING -->
<div id="landing" class="card">
  <img src="logo.png" class="logo">

  <h1 data-lang-en="Haramain" data-lang-ar="الحرمين">Haramain</h1>

  <p data-lang-en="Your Complete Pilgrim Companion"
     data-lang-ar="رفيق الحاج الكامل">
  </p>

  <select id="langSelect">
    <option value="en">English</option>
    <option value="ar">العربية</option>
  </select>

  <button id="loginBtn">🔐 Login (Pi)</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <h2>Welcome, <span id="username"></span></h2>
  <button id="logoutBtn">Logout</button>

  <div class="grid">
    <button id="btnID">ID</button>
    <button id="btnBooking">Booking</button>
    <button id="btnWallet">Wallet</button>
    <button id="btnPrayer">Prayer</button>
    <button id="btnAlerts">Alerts</button>
    <button id="btnDonate">Donate</button>
  </div>

  <div class="utilities">

    <div id="pilgrimID" class="utility">
      <canvas id="qr"></canvas>
      <p id="pid"></p>
    </div>

    <div id="booking" class="utility">
      <input id="amountInput" type="number" placeholder="Amount π">
      <button id="payBtn">Pay</button>
      <p id="paymentStatus"></p>
    </div>

    <div id="wallet" class="utility">
      Balance: <span id="balance">0</span> π
      <input id="sendAmount" type="number">
      <button id="sendBtn">Send</button>
      <ul id="txHistory"></ul>
    </div>

    <div id="donations" class="utility">
      <input id="donateAmount" type="number">
      <button id="donateBtn">Donate</button>
      <ul id="donationHistory"></ul>
    </div>

  </div>
</div>

<div id="status">🧪 Pi TESTNET MODE</div>

</div>

<script src="script.js"></script>

</body>
</html>
