<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Haramain</title>

<meta name="description"
content="Haramain — Your Complete Pilgrim Companion for Hajj and Umrah.">

<link rel="icon" href="logo.png">

<link rel="stylesheet" href="style.css">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<!-- LANDING PAGE -->

<div id="landing" class="card">

<img src="logo.png" class="logo">

<h1 data-lang-en="Haramain"
data-lang-ar="الحرمين"
data-lang-fr="Haramain">
Haramain
</h1>

<p
data-lang-en="Your Complete Pilgrim Companion"
data-lang-ar="رفيق الحاج الكامل"
data-lang-fr="Votre compagnon de pèlerinage complet">

Your Complete Pilgrim Companion

</p>

<label
data-lang-en="Language:"
data-lang-ar="اللغة:"
data-lang-fr="Langue:">
Language:
</label>

<select id="langSelect">

<option value="en">English</option>
<option value="ar">Arabic</option>
<option value="fr">French</option>

</select>

<button id="loginBtn"
data-lang-en="🔐 Login / Register (Pi)"
data-lang-ar="🔐 تسجيل الدخول / التسجيل"
data-lang-fr="🔐 Connexion / Inscription">

🔐 Login / Register (Pi)

</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<h2>

<span data-lang-en="Welcome,"
data-lang-ar="مرحباً,"
data-lang-fr="Bienvenue,">
Welcome,
</span>

<span id="username"></span>

</h2>

<button id="logoutBtn"
data-lang-en="Logout"
data-lang-ar="تسجيل الخروج"
data-lang-fr="Déconnexion">

Logout

</button>


<!-- QUICK ACCESS -->

<h3
data-lang-en="Quick Access"
data-lang-ar="الوصول السريع"
data-lang-fr="Accès rapide">

Quick Access

</h3>

<div class="grid">

<button id="btnID">Pilgrim ID</button>

<button id="btnBooking">Booking</button>

<button id="btnWallet">Wallet</button>

<button id="btnPrayer">Prayer</button>

<button id="btnAlerts">Alerts</button>

<button id="btnDonate">Donations</button>

</div>


<!-- UTILITIES -->


<div id="pilgrimID" class="utility">

<h3>Pilgrim Digital ID</h3>

<canvas id="qr"></canvas>

<p>ID: <span id="pid"></span></p>

</div>



<div id="booking" class="utility">

<h3>Hajj / Umrah Booking</h3>

<input id="flight" placeholder="Flight">

<input id="hotel" placeholder="Hotel">

<input id="transport" placeholder="Transport">

<input id="amount" type="number" placeholder="Amount π">

<button id="payBtn">Pay & Book</button>

</div>



<div id="wallet" class="utility">

<h3>Pi Wallet</h3>

<p>Balance: <span id="balance">0</span> π</p>

<button id="refreshBalance">Refresh Balance</button>

<input id="sendTo" placeholder="Wallet ID">

<input id="sendAmount" type="number" placeholder="Amount">

<button id="sendBtn">Send Pi</button>

<ul id="txHistory"></ul>

</div>



<div id="prayer" class="utility">

<h3>Prayer Times</h3>

<ul id="prayerList"></ul>

</div>



<div id="alerts" class="utility">

<h3>Crowd Alerts</h3>

<ul id="alertsList"></ul>

</div>



<div id="donations" class="utility">

<h3>Zakat / Waqf</h3>

<input id="donateAmount" type="number" placeholder="Amount π">

<button id="donateBtn">Donate</button>

<ul id="donationHistory"></ul>

</div>


</div>


<div id="status">

Open Haramain in Pi Browser to continue

</div>

<footer>© 2026 Haramain</footer>

</div>

<script src="script.js"></script>

</body>
</html>
